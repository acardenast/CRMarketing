<header class="navbar">

  <!-- Logo -->
  <a routerLink="/dashboard" class="navbar-brand">
    <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
      <rect width="44" height="44" rx="10" fill="#01696f"/>
      <path d="M14 30V16l8-4 8 4v14l-8 4-8-4z" stroke="white" stroke-width="2" fill="none"/>
      <circle cx="22" cy="22" r="3" fill="white"/>
    </svg>
    <span>CRM</span>
  </a>

  <!-- Nav links -->
  <nav class="navbar-nav">

    <!-- Dashboard — todos los roles -->
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>

    <!-- ADMIN + EMPRESA: Clientes y Acciones -->
    @if (isAdmin() || isEmpresa()) {
      <a routerLink="/clientes" routerLinkActive="active" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Clientes
      </a>
      <a routerLink="/acciones" routerLinkActive="active" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        Acciones
      </a>
    }

    <!-- ADMIN: Empresas -->
    @if (isAdmin()) {
      <a routerLink="/empresas" routerLinkActive="active" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        Empresas
      </a>
    }

    <!-- CLIENTE: solo ve sus acciones -->
    @if (isCliente()) {
      <a routerLink="/acciones" routerLinkActive="active" class="nav-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        Mis acciones
      </a>
      <a routerLink="/chat" routerLinkActive="active" class="nav-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Chat
      </a>
    }

  </nav>

  <!-- Usuario + rol badge + logout -->
  <div class="navbar-user">
    <div class="user-info">
      <span class="user-name">{{ user()?.name }}</span>
      <span class="user-role rol-{{ user()?.rol }}">{{ user()?.rol }}</span>
    </div>
    <div class="user-avatar">{{ user()?.name?.charAt(0)?.toUpperCase() }}</div>
    <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16,17 21,12 16,7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>

</header>
