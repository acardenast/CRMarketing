<header class="topnav" role="banner">
  <div class="topnav-bar">

    <div class="topnav-left">
      <a routerLink="/dashboard" class="brand" aria-label="CRM Marketing">
        <svg class="brand-mark" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3.5 15.5V4.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
          <path d="M8.5 15.5V8" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
          <path d="M13.5 15.5V6.25" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
          <path d="M16.5 15.5V2.75" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">CRM Marketing</span>
      </a>

      <nav class="topnav-links" aria-label="Navegación principal">

        <a routerLink="/dashboard" routerLinkActive="active"
           [routerLinkActiveOptions]="{exact:true}" class="nav-link">
          <i data-lucide="layout-dashboard" width="14" height="14"></i>
          Dashboard
        </a>

        @if (isAdmin() || isEmpresa()) {
          <a routerLink="/clientes" routerLinkActive="active" class="nav-link">
            <i data-lucide="users" width="14" height="14"></i>
            Clientes
          </a>
          <a routerLink="/acciones" routerLinkActive="active" class="nav-link">
            <i data-lucide="activity" width="14" height="14"></i>
            Acciones
          </a>
        }

        @if (isAdmin()) {
          <a routerLink="/empresas" routerLinkActive="active" class="nav-link">
            <i data-lucide="building-2" width="14" height="14"></i>
            Empresas
          </a>
        }

        @if (isCliente()) {
          <a routerLink="/acciones" routerLinkActive="active" class="nav-link">
            <i data-lucide="activity" width="14" height="14"></i>
            Mis acciones
          </a>
          <a [routerLink]="['/chat/cliente', auth.user()?.cliente_id]" routerLinkActive="active" class="nav-link">
            <i data-lucide="message-square" width="14" height="14"></i>
            Chat
          </a>
        }

      </nav>
    </div>

    <div class="topnav-right">
      <button class="icon-btn" (click)="toggleTheme()" [attr.aria-label]="themeLabel()">
        <i [attr.data-lucide]="themeIcon()" width="15" height="15"></i>
      </button>

      <div class="user-block">
        <div class="user-avatar" aria-hidden="true">{{ user()?.name?.charAt(0)?.toUpperCase() }}</div>
        <div class="user-meta">
          <span class="user-name">{{ user()?.name }}</span>
          <span class="user-role">{{ user()?.rol }}</span>
        </div>
      </div>

      <button class="icon-btn logout-btn" (click)="logout()" aria-label="Cerrar sesión">
        <i data-lucide="log-out" width="15" height="15"></i>
      </button>
    </div>

  </div>
</header>
