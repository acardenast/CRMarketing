<!-- Botón hamburger para móvil -->
<button class="sidebar-hamburger" (click)="toggleMobile()" aria-label="Abrir menú">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- Overlay mobile -->
@if (mobileOpen()) {
  <div class="sidebar-overlay" (click)="toggleMobile()"></div>
}

<aside class="sidebar" [class.mobile-open]="mobileOpen()">

  <!-- Logo -->
  <a routerLink="/dashboard" class="sidebar-brand" (click)="closeMobile()">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
        <path d="M8 24V12l8-5 8 5v12" stroke="currentColor" stroke-width="1.75" fill="none"/>
        <circle cx="16" cy="18" r="2.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">CRMarketing</span>
      <span class="brand-sub">Enterprise Pro</span>
    </div>
  </a>

  <!-- CTA principal -->
  <button class="sidebar-cta btn-transition">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Nuevo Registro
  </button>

  <!-- Navegación -->
  <nav class="sidebar-nav">

    <!-- Dashboard — todos los roles -->
    <a routerLink="/dashboard" routerLinkActive="active"
       [routerLinkActiveOptions]="{exact:true}" class="nav-link btn-transition"
       (click)="closeMobile()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Panel Principal
    </a>

    @if (isAdmin() || isEmpresa()) {
      <a routerLink="/clientes" routerLinkActive="active" class="nav-link btn-transition"
         (click)="closeMobile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Clientes
      </a>
      <a routerLink="/acciones" routerLinkActive="active" class="nav-link btn-transition"
         (click)="closeMobile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        Registro de Acciones
      </a>
    }

    @if (isAdmin()) {
      <a routerLink="/empresas" routerLinkActive="active" class="nav-link btn-transition"
         (click)="closeMobile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        Empresas
      </a>
    }

    @if (isCliente()) {
      <a routerLink="/acciones" routerLinkActive="active" class="nav-link btn-transition"
         (click)="closeMobile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        Mis Acciones
      </a>
      <a [routerLink]="['/chat/cliente', auth.user()?.cliente_id]"
         routerLinkActive="active" class="nav-link btn-transition"
         (click)="closeMobile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
    }

  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="nav-divider"></div>

    <a routerLink="/ajustes" routerLinkActive="active" class="nav-link btn-transition"
       (click)="closeMobile()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Ajustes
    </a>

    <!-- Usuario + toggle dark mode + logout -->
    <div class="user-card">
      <div class="user-avatar">{{ user()?.name?.charAt(0)?.toUpperCase() }}</div>
      <div class="user-info">
        <span class="user-name">{{ user()?.name }}</span>
        <span class="user-role role-{{ user()?.rol }}">{{ user()?.rol }}</span>
      </div>
      <div class="user-actions">
        <button class="icon-btn btn-transition" (click)="toggleTheme()" [title]="isDark() ? 'Modo claro' : 'Modo oscuro'" aria-label="Cambiar tema">
          @if (isDark()) {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          } @else {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          }
        </button>
        <button class="icon-btn btn-transition" (click)="logout()" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</aside>
