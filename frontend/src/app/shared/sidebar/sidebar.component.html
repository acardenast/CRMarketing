<aside class="navbar">

  <!-- Logo -->
  <a routerLink="/dashboard" class="navbar-brand">
    <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-label="CRM Marketing logo">
      <rect width="32" height="32" rx="8" fill="rgba(79,152,163,.15)"/>
      <path d="M7 25V14l9-6 9 6v11" stroke="#4f98a3" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <circle cx="16" cy="19" r="2.5" fill="#4f98a3"/>
    </svg>
    <div class="brand-wordmark">
      <span class="brand-name">CRM</span>
      <span class="brand-sub">Marketing</span>
    </div>
  </a>

  <!-- Nav -->
  <nav class="navbar-nav">

    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    @if (isAdmin() || isEmpresa()) {
      <a routerLink="/clientes" routerLinkActive="active" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Clientes
      </a>
      <a routerLink="/acciones" routerLinkActive="active" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        Acciones
      </a>
    }

    @if (isAdmin()) {
      <a routerLink="/empresas" routerLinkActive="active" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        Empresas
      </a>
    }

    @if (isCliente()) {
      <a routerLink="/acciones" routerLinkActive="active" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
        </svg>
        Mis acciones
      </a>
      <a [routerLink]="['/chat/cliente', auth.user()?.cliente_id]" routerLinkActive="active" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
    }

  </nav>

  <!-- Usuario footer -->
  <div class="navbar-user">
    <div class="user-row">
      <div class="user-avatar">{{ user()?.name?.charAt(0)?.toUpperCase() }}</div>
      <div class="user-info">
        <span class="user-name">{{ user()?.name }}</span>
        <span class="user-role">{{ user()?.rol }}</span>
      </div>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16,17 21,12 16,7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

</aside>
