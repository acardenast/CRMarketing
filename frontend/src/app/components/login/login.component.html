<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="12" fill="#01696f"/>
        <path d="M14 30V16l8-4 8 4v14l-8 4-8-4z" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="22" cy="22" r="3" fill="white"/>
      </svg>
      <h1>CRM</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()" novalidate>

      <div class="field">
        <label for="login">Usuario o email</label>
        <input
          id="login"
          type="text"
          [(ngModel)]="loginValue"
          name="login"
          placeholder="usuario o email"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> Entrando… }
        @else { Iniciar sesión }
      </button>

    </form>

    <div class="register-section">
      <span class="register-label">¿Aún no tienes cuenta?</span>
      <div class="register-buttons">
        <a routerLink="/registro/empresa" class="btn-register">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>
          Registrar empresa
        </a>
        <a routerLink="/registro/cliente" class="btn-register btn-register--secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Registrar cliente
        </a>
      </div>
    </div>

  </div>
</div>
