<div class="registro-wrapper">
  <div class="registro-card">
    <div class="registro-header">
      <svg width="40" height="40" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="12" fill="#01696f"/>
        <circle cx="22" cy="17" r="5" stroke="white" stroke-width="2" fill="none"/>
        <path d="M10 36c0-6 5.4-10 12-10s12 4 12 10" stroke="white" stroke-width="2" fill="none"/>
      </svg>
      <h1>Registrar cliente</h1>
      <p>Accede a los servicios de tu empresa</p>
    </div>

    <form (ngSubmit)="onSubmit()" novalidate>

      <div class="field">
        <label>Empresa *</label>
        @if (empresasCargando) {
          <div class="select-loading">Cargando empresas…</div>
        } @else if (empresas.length === 0) {
          <div class="select-empty">No hay empresas disponibles</div>
        } @else {
          <select [(ngModel)]="form.empresa_id" name="empresa_id" required>
            <option value="" disabled>Selecciona tu empresa</option>
            @for (e of empresas; track e.id) {
              <option [value]="e.id">{{ e.nombre }}</option>
            }
          </select>
        }
      </div>

      <div class="row2">
        <div class="field">
          <label>Nombre completo *</label>
          <input type="text" [(ngModel)]="form.name" name="name" placeholder="Juan López" required />
        </div>
        <div class="field">
          <label>Nombre de usuario *</label>
          <input type="text" [(ngModel)]="form.username" name="username" placeholder="juanlopez" required />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Email *</label>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="tu@email.com" required />
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input type="text" [(ngModel)]="form.telefono" name="telefono" placeholder="+34 600 000 000" />
        </div>
      </div>
      <div class="field">
        <label>Nombre de tu empresa (opcional)</label>
        <input type="text" [(ngModel)]="form.empresa_cliente" name="empresa_cliente" placeholder="Empresa donde trabajas" />
      </div>
      <div class="row2">
        <div class="field">
          <label>Contraseña *</label>
          <input type="password" [(ngModel)]="form.password" name="password" required />
        </div>
        <div class="field">
          <label>Repetir contraseña *</label>
          <input type="password" [(ngModel)]="form.password_confirmation" name="password_confirmation" required />
        </div>
      </div>

      @if (error) { <div class="error-msg">{{ error }}</div> }

      <button type="submit" class="btn-primary" [disabled]="loading || empresasCargando">
        {{ loading ? 'Registrando…' : 'Crear cuenta' }}
      </button>
    </form>

    <div class="back-link">
      <a routerLink="/login">← Volver al login</a>
    </div>
  </div>
</div>
