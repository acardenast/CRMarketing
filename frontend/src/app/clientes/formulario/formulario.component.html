<div class="form-page">

  <div class="form-back">
    <a routerLink="/clientes" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
      Volver a clientes
    </a>
  </div>

  <div class="form-card">

    <div class="form-card-header">
      <div class="form-card-header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div>
        <h1 class="form-title">{{ esEdicion ? 'Editar cliente' : 'Nuevo cliente' }}</h1>
        <p class="form-subtitle">{{ esEdicion ? 'Modifica los datos del cliente' : 'Completa el formulario para registrar un nuevo cliente' }}</p>
      </div>
    </div>

    <div *ngIf="error" class="form-alert">{{ error }}</div>

    <form (ngSubmit)="guardar()" #formulario="ngForm" class="form-body">

      <div class="form-field">
        <label class="field-label">Nombre <span class="field-required">*</span></label>
        <input type="text" class="field-input" [(ngModel)]="cliente.nombre" name="nombre" required placeholder="Nombre completo"/>
      </div>

      <div class="form-field">
        <label class="field-label">Email <span class="field-required">*</span></label>
        <input type="email" class="field-input" [(ngModel)]="cliente.email" name="email" required placeholder="correo@ejemplo.com"/>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="field-label">Teléfono</label>
          <input type="text" class="field-input" [(ngModel)]="cliente.telefono" name="telefono" placeholder="+34 600 000 000"/>
        </div>
        <div class="form-field">
          <label class="field-label">Empresa del cliente</label>
          <input type="text" class="field-input" [(ngModel)]="cliente.empresa_cliente" name="empresa_cliente" placeholder="Nombre de su empresa"/>
        </div>
      </div>

      <div class="form-field">
        <label class="field-label">Empresa (CRM) <span class="field-required">*</span></label>
        <select class="field-input" [(ngModel)]="cliente.empresa_id" name="empresa_id" required>
          <option [ngValue]="null" disabled>Selecciona una empresa</option>
          <option *ngFor="let e of empresas" [ngValue]="e.id">{{ e.nombre }}</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="field-label">Estado</label>
          <select class="field-input" [(ngModel)]="cliente.estado" name="estado">
            <option value="lead">Lead</option>
            <option value="contactado">Contactado</option>
            <option value="negociacion">Negociación</option>
            <option value="cliente">Cliente</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
        <div class="form-field">
          <label class="field-label">Fecha de contacto</label>
          <input type="date" class="field-input" [(ngModel)]="cliente.fecha_contacto" name="fecha_contacto"/>
        </div>
      </div>

      <div class="form-field">
        <label class="field-label">Notas</label>
        <textarea class="field-input field-textarea" [(ngModel)]="cliente.notas" name="notas" rows="3" placeholder="Observaciones sobre el cliente..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="guardando || formulario.invalid">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
          {{ guardando ? 'Guardando...' : (esEdicion ? 'Actualizar cliente' : 'Crear cliente') }}
        </button>
        <a routerLink="/clientes" class="btn-cancel">Cancelar</a>
      </div>

    </form>
  </div>
</div>
